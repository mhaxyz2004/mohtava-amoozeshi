{% extends 'base.html' %}

{% block title %}ثبت‌نام - محتوای آموزشی{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <h2 class="text-center mb-4">ثبت‌نام</h2>
                <form method="post" novalidate>
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                        <div class="alert alert-danger mt-2">
                            {{ field.errors }}
                        </div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100 btn-lg">ثبت‌نام</button>
                </form>
                <p class="text-center mt-3">
                    حساب دارید؟ <a href="{% url 'login' %}">وارد شوید</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
